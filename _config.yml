# Jekyll configuration
markdown: kramdown
highlighter: rouge
paginate: 100 # it will paginate after this number
language: "en"

# edit baseurl to simply '/' if using as your personal page (instead of a project page)
baseurl: /

# Website info
title: Antony's blog
description: My Personal Projects & Opinions
cover: assets/images/blog-cover.jpg
logo: assets/images/blog-icon.png
logo_dark: assets/images/favicon.png
favicon: assets/images/favicon.png
production_url: https://blog.leons.dev/
source_url: https://github.com/AntonyLeons/blog.leons.dev/
url: https://blog.leons.dev
CNAME: blog.leons.dev

# Social info
navigation: True # show the navbar links
subscribers: False # you need to connect an external service for this to work,
# if 'True' the submit button is disabled for now, but you can change that
# by editing `_includes/subscribe-form.html`
x_username: AntonyLeons # replace by your username
github: AntonyLeons

# Disqus
disqus: False
disqus_shortname: leons-dev # replace with your disqus username

# Google Analytics
#  google_analytics: UA-135515365-1 # in Analytics.html

# Permalinks
permalink: /:title
# permalink: /author/:author
# permalink: /tag/:tag

# Authors' info in `_data/authors.yml`
# Tags' info in `_data/tags_info.yml`

# gems and other configs
plugins_dir: ./_plugins
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-algolia

algolia:
  application_id: '08WJSG8GMW'
  index_name: 'jekyll'
  search_only_api_key: '899d0b22cae5a8affeb4f1f9f35adcc4'

feed:
  path: feed.xml

# Additional settings available on the front-matter
# Site logo in the index.html (as in demo.ghost.io)
# Author's page cover in _layouts/author.html
# The same for page.html and tag.html layouts
# Post's page cover as a per-post basis _posts/...
# Disqus comments as a per-post basis
# ...

# Settings for building master branch with travis-ci
# removed as part of cleanup

safe: False
lsi: False

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - package.json
  - README.md
  - changelog.md
  - "*.Rmd"
  - .git*
  - dist
